<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sim</title>
</head>

<body>

    <style>
        *,
        ::after,
        ::before {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(#87ceeb, #87ceeb 70%, #228B22 70%);
            /* Sky + grass split */
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Grass blades container */
        .grass {
            position: relative;
            width: 100%;
            height: 30%;
            overflow: hidden;
        }

        /* Individual grass blades */
        .blade {
            position: absolute;
            bottom: 0;
            width: 2px;
            height: 40px;
            background: linear-gradient(to top, #006400, #32CD32);
            transform-origin: bottom center;
            animation: sway 3s ease-in-out infinite alternate;
        }

        /* Animation for swaying grass */
        @keyframes sway {
            0% {
                transform: rotate(-5deg);
            }

            100% {
                transform: rotate(5deg);
            }
        }

        .realtime {
            border: 3px solid #000;
        }

        .pesudotime {
            border: 2px solid #000;

        }
    </style>
    </head>

    <body>
        <div class="realtime">
            <div class="counter">
                <div class="time-box">
                    <span id="days">0</span>
                    <label>D</label>
                </div>
                <div class="time-box">
                    <span id="Hours">0</span>
                    <label>H</label>
                </div>
                <div class="time-box">
                    <span id="minutes">0</span>
                    <label>M</label>
                </div>
                <div class="time-box">
                    <span id="seconds">0</span>
                    <label>S</label>
                </div>
                <div class="time-box">
                    <span id="miliseconds">0</span>
                    <label>Ms</label>
                </div>
            </div>
            <div class="pesudotime">
                <div class="counter">
                    <div class="time-box">
                        <span id="days">0</span>
                        <label>D</label>
                    </div>
                    <div class="time-box">
                        <span id="Hours">0</span>
                        <label>H</label>
                    </div>
                    <div class="time-box">
                        <span id="minutes">0</span>
                        <label>M</label>
                    </div>
                    <div class="time-box">
                        <span id="seconds">0</span>
                        <label>S</label>
                    </div>
                    <div class="time-box">
                        <span id="miliseconds">0</span>
                        <label>Ms</label>
                    </div>

                    <div class="grass" id="grass"></div>
                </div>
            </div>


            <script>
                // Generate multiple grass blades dynamically
                const grassContainer = document.getElementById('grass');
                const bladeCount = 1000; // number of blades

                for (let i = 0; i < bladeCount; i++) {
                    const blade = document.createElement('div');
                    blade.classList.add('blade');
                    blade.style.left = `${Math.random() * 100}%`;
                    blade.style.height = `${30 + Math.random() * 80}px`;
                    blade.style.animationDelay = `${Math.random() * 1}s`;
                    grassContainer.appendChild(blade);
                }
            </script>
    </body>

</html>
